services:
  # Database
  db:
    image: mariadb:latest
    container_name: etodo-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: PINEapple
      MYSQL_DATABASE: etodo
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./e-todo.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - etodo-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Backend API
  backend:
    build: ./backend
    container_name: etodo-backend
    restart: always
    environment:
      PORT: 3001
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: PINEapple
      DB_NAME: etodo
      JWT_SECRET: 7f9a2b8e4d6c1a5f3e8b9d2c4a6f1e7b9c3d5a8f2e4b7d9c1a6f3e5b8d2c4a7f
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - etodo-network

  # Frontend
  frontend:
    build: ./frontend
    container_name: etodo-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - etodo-network

networks:
  etodo-network:
    driver: bridge

volumes:
  db_data:
